apiVersion: v1
kind: Service
metadata:
  name: {{ include "myfeeder.fullname" . }}-redis
  labels:
    {{- include "myfeeder.labels" . | nindent 4 }}
    {{- include "myfeeder.redisSelectorLabels" . | nindent 4 }}
spec:
  type: ClusterIP
  ports:
    - port: 6379
      targetPort: 6379
      protocol: TCP
  selector:
    {{- include "myfeeder.redisSelectorLabels" . | nindent 4 }}
