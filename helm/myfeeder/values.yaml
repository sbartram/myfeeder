nameOverride: ""
fullnameOverride: ""

app:
  image:
    repository: gitea.bartram.org:3000/bartram/myfeeder
    tag: latest
    pullPolicy: Always
  imagePullSecrets: []
  service:
    type: LoadBalancer
    port: 8080
    annotations:
      metallb.universe.tf/loadBalancerIPs: "192.168.44.203"
  resources: {}
  replicaCount: 1

postgres:
  image:
    repository: postgres
    tag: "16"
  database: myfeeder
  username: myfeeder
  storage:
    storageClass: nfs-client
    size: 5Gi

redis:
  image:
    repository: redis
    tag: "7"

spring:
  profiles: ""

secrets:
  postgresPassword: ""
  anthropicApiKey: ""
  googleApplicationCredentials: ""
