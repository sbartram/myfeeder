nameOverride: ""
fullnameOverride: ""

app:
  image:
    repository: registry.bartram.org/bartram/myfeeder
    tag: ""
    pullPolicy: Always
  imagePullSecrets: []
  service:
    type: LoadBalancer
    port: 80
    annotations:
      metallb.universe.tf/loadBalancerIPs: "192.168.44.204"
  resources:
    requests:
      memory: "512Mi"
      cpu: "500m"
    limits:
      memory: "2Gi"
  replicaCount: 1
  probes:
    startup:
      periodSeconds: 5
      failureThreshold: 60
    readiness:
      initialDelaySeconds: 0
      periodSeconds: 10
    liveness:
      periodSeconds: 30
      failureThreshold: 5

externalPostgres:
  host: pg.bartram.org
  port: 5432
  database: myfeeder
  username: myfeeder

redis:
  image:
    repository: redis
    tag: "7"

spring:
  profiles: ""

secrets:
  postgresPassword: ""
  anthropicApiKey: ""
  googleApplicationCredentials: ""
